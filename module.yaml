schema_version: 1

name: llm
name_zh: 大语言模型
description: >
  LLM 大模型推理：支持对话、Tool Calling、性能测试。兼容 OpenAI API。
category: model

build:
  packages:
    - components/model_zoo/llm

profiles:
  recommended:
    - kx-generic-omni_agent

capabilities:
  - id: llm.server
    name_zh: 启动推理服务
    description: 启动 OpenAI 兼容的 HTTP 推理服务（llama-server）
    system_binaries: [llama-server]
    models: [~/.cache/models/llm/]

  - id: llm.chat
    name_zh: 对话测试
    description: 通过 SDK 示例程序与大模型对话（需先启动 llm.server）
    binaries: [llm_chat]
    depends_on: [llm.server]

  - id: llm.benchmark
    name_zh: 性能测试
    description: 测试推理速度（tokens/s）和首 token 延迟
    system_binaries: [llama-bench]
    models: [~/.cache/models/llm/]

  - id: llm.direct_chat
    name_zh: 直接对话
    description: 不启动服务，直接在终端与模型对话（llama-cli）
    system_binaries: [llama-cli]
    models: [~/.cache/models/llm/]

hardware: []
depends_on: []
